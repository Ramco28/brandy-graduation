<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Brandy</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url('graduation.jpg') center/cover no-repeat;
        font-family: Georgia, serif;
        color: white;
        text-align: center;
    }

    .card {
        background: rgba(0, 0, 0, 0.6);
        padding: 40px;
        border-radius: 25px;
        width: 75%;
        max-width: 850px;
        backdrop-filter: blur(6px);
        animation: fadeIn 2s ease;
        z-index: 2;
    }

    h1 {
        font-size: 55px;
        letter-spacing: 8px;
        margin-bottom: 25px;
    }

    p {
        font-size: 24px;
        line-height: 1.8;
        white-space: pre-line;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(25px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">
    <h1>BRANDY</h1>

    <p>
Beyond these halls, your story only starts
Radiating laughter even through hard days
Always carrying light into the lives around you
Never afraid to dream louder than fear
Destined for horizons wider than this moment
Years from now, may you still remember who you were here
    </p>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.5;

    for (let i = 0; i < 70; i++) {
        particles.push({
            x: x,
            y: y,
            angle: Math.random() * Math.PI * 2,
            speed: Math.random() * 5 + 2,
            radius: Math.random() * 2 + 1,
            life: 100,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
    }
}

function animateFireworks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.speed *= 0.96;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animateFireworks);
}

setInterval(createFirework, 900);
animateFireworks();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
